<!DOCTYPE html>

<head>

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;

            transition: opacity 0.3s;

        .github-link:hover {
            opacity: 0.8;
        }
